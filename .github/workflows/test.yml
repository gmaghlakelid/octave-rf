name: Octave BIST
on: [push, pull_request, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Octave
        run: sudo apt-get update && sudo apt-get install -y octave
      - name: Run BIST tests
        run: |
          octave --no-gui -q --eval "
            addpath('inst');
            files = dir('inst/*.m');
            total_p = 0; total_t = 0; any_fail = 0;
            for k = 1:length(files)
              fname = files(k).name(1:end-2);
              [p, t] = test(fname, 'normal');
              total_p += p; total_t += t;
              if p < t; any_fail = 1; end
              printf('%-20s %d/%d\n', fname, p, t);
            end
            printf('TOTAL: %d/%d\n', total_p, total_t);
            if any_fail; exit(1); end
          "
